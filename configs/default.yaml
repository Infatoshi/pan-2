model:
  image_size: 64
  d_model: 512
  n_layers: 8
  n_heads: 8
  context_len: 128
  action_chunk: 10
  n_discrete: 23
  mouse_dim: 2
  backbone: transformer
  frame_subsample: 2
  stem_channels: 32

train:
  stage: pretrain
  # 64 not 32: -19% ms/sample measured (sweep 2026-07-15) and doubles
  # in-batch negatives 32 -> 64 for the contrastive loss (user-approved)
  batch_size: 64
  lr: 0.0003
  max_steps: 10000
  log_every: 50
  ckpt_every: 1000
  num_workers: 4
  device: cuda
  bf16: true
  synthetic: false
  data_dir: /data/pan-2/shards
  ckpt_dir: data/checkpoints
  keep_uint8: true
  compile: false
